<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Hay Buy Helper</title>
  
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png"> 
  
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f5f7f2;
      color: #1f2933;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px;
    }

    .header {
      background: #31572c;
      color: white;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 16px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .summary {
      background: #e9f5db;
      border: 2px solid #31572c;
    }

    .summary h2 {
      margin-top: 0;
      font-size: 20px;
      color: #31572c;
    }

    .deal {
      border-left: 6px solid #d1d5db;
    }

    .deal.best {
      border-left-color: #31572c;
      background: #f0f8e8;
    }

    .deal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #eef0f2;
      padding: 7px 0;
      font-size: 14px;
    }

    .row strong {
      text-align: right;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .cash {
      background: #dbeafe;
      color: #1e40af;
    }

    .loan {
      background: #fee2e2;
      color: #991b1b;
    }

    .best-badge {
      background: #31572c;
      color: white;
    }

    .note {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
  <img src="logo.png" class="logo">

  <h1>Hay Buy Helper</h1>

  <p>Compare upfront hay purchase deals instantly</p>
</div>

    <div class="card">
      <label for="tons">Tonnage</label>
      <input id="tons" type="number" value="2000" min="0" step="1" />

      <label for="basePrice">Base Price Per Ton</label>
      <input id="basePrice" type="number" value="200" min="0" step="1" />
    </div>

    <div id="bestSummary" class="card summary"></div>

    <div id="topThreeSummary" class="card"></div>

    <div id="deals"></div>

    <div class="note">
      Loan rule: deals above 50% upfront use 7% loan interest on the full contract amount for 12 months.
    </div>
  </div>

  <script>
    const LOAN_RATE = 0.07;

    const deals = [
      { name: "Base Price Deal", discount: 0, upfrontPercent: 0.20 },
      { name: "$5 Off Deal", discount: 5, upfrontPercent: 0.40 },
      { name: "$8 Off Deal", discount: 8, upfrontPercent: 0.50 },
      { name: "$10 Off Deal", discount: 10, upfrontPercent: 0.60 },
      { name: "$12 Off Deal", discount: 12, upfrontPercent: 0.70 },
      { name: "$15 Off Deal", discount: 15, upfrontPercent: 0.80 },
      { name: "$20 Off Deal", discount: 20, upfrontPercent: 0.90 }
    ];

    const money = value =>
      value.toLocaleString("en-US", {
        style: "currency",
        currency: "USD",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

    const number = value =>
      value.toLocaleString("en-US", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });

    function calculateDeal(tons, basePrice, deal) {
      const finalPricePerTon = basePrice - deal.discount;
      const totalContractAmount = tons * finalPricePerTon;
      const upfrontMoney = totalContractAmount * deal.upfrontPercent;
      const balanceUponDelivery = totalContractAmount - upfrontMoney;
      const loanNeeded = deal.upfrontPercent > 0.50;

      // IMPORTANT LOGIC:
      // If loan is needed, interest is calculated on the FULL CONTRACT AMOUNT.
      // If upfront is 50% or less, no loan interest is added.
      const loanInterest = loanNeeded ? totalContractAmount * LOAN_RATE : 0;

      const finalCostIncludingInterest = totalContractAmount + loanInterest;
      const effectiveCostPerTon = tons > 0 ? finalCostIncludingInterest / tons : 0;

      return {
        ...deal,
        finalPricePerTon,
        totalContractAmount,
        upfrontMoney,
        balanceUponDelivery,
        loanNeeded,
        loanInterest,
        finalCostIncludingInterest,
        effectiveCostPerTon
      };
    }

    function render() {
      const tons = Number(document.getElementById("tons").value) || 0;
      const basePrice = Number(document.getElementById("basePrice").value) || 0;

      const results = deals.map(deal => calculateDeal(tons, basePrice, deal));
      const sorted = [...results].sort((a, b) => a.effectiveCostPerTon - b.effectiveCostPerTon);
      const bestDeal = sorted[0];

      document.getElementById("bestSummary").innerHTML = `
        <h2>Best Deal</h2>
        <div class="deal-title">${bestDeal.name}</div>
        <div class="row"><span>Effective Cost / Ton</span><strong>${money(bestDeal.effectiveCostPerTon)}</strong></div>
        <div class="row"><span>Total Contract Amount</span><strong>${money(bestDeal.totalContractAmount)}</strong></div>
        <div class="row"><span>Upfront Money Needed</span><strong>${money(bestDeal.upfrontMoney)}</strong></div>
        <div class="row"><span>Balance Upon Delivery</span><strong>${money(bestDeal.balanceUponDelivery)}</strong></div>
        <div class="row"><span>Loan Interest</span><strong>${money(bestDeal.loanInterest)}</strong></div>
        <div class="row"><span>Final Cost Incl. Interest</span><strong>${money(bestDeal.finalCostIncludingInterest)}</strong></div>
      `;

      const topThree = sorted.slice(0, 3);

      document.getElementById("topThreeSummary").innerHTML = `
        <h2>Top 3 Deals</h2>
        ${topThree.map((deal, index) => `
          <div class="row">
            <span>#${index + 1} ${deal.name}</span>
            <strong>${money(deal.effectiveCostPerTon)} / ton</strong>
          </div>
        `).join("")}
      `;

      document.getElementById("deals").innerHTML = sorted.map(deal => {
        const isBest = deal.name === bestDeal.name;
        const rank = sorted.findIndex(item => item.name === deal.name) + 1;

        return `
          <div class="card deal ${isBest ? "best" : ""}">
            ${isBest ? '<span class="badge best-badge">BEST DEAL</span><br>' : ''}
            <span class="badge ${deal.loanNeeded ? "loan" : "cash"}">
              ${deal.loanNeeded ? "LOAN NEEDED" : "OWN CASH"}
            </span>
            <div class="deal-title">Rank #${rank} — ${deal.name}</div>
            <div class="row"><span>Discount / Ton</span><strong>${money(deal.discount)}</strong></div>
            <div class="row"><span>Upfront %</span><strong>${deal.upfrontPercent * 100}%</strong></div>
            <div class="row"><span>Final Price / Ton</span><strong>${money(deal.finalPricePerTon)}</strong></div>
            <div class="row"><span>Total Contract Amount</span><strong>${money(deal.totalContractAmount)}</strong></div>
            <div class="row"><span>Upfront Money</span><strong>${money(deal.upfrontMoney)}</strong></div>
            <div class="row"><span>Balance Upon Delivery</span><strong>${money(deal.balanceUponDelivery)}</strong></div>
            <div class="row"><span>Loan Interest</span><strong>${money(deal.loanInterest)}</strong></div>
            <div class="row"><span>Final Cost</span><strong>${money(deal.finalCostIncludingInterest)}</strong></div>
            <div class="row"><span>Effective Cost / Ton</span><strong>${money(deal.effectiveCostPerTon)}</strong></div>
          </div>
        `;
      }).join("");
    }

    document.getElementById("tons").addEventListener("input", render);
    document.getElementById("basePrice").addEventListener("input", render);

    render();
  </script>
</body>
</html>
